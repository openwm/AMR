services:
  db:
    image: postgres:16-alpine
    container_name: openwm-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openwm}
      POSTGRES_USER: ${POSTGRES_USER:-openwm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openwm_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openwm} -d ${POSTGRES_DB:-openwm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: openwm-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: openwm-api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-openwm}:${POSTGRES_PASSWORD:-openwm_dev}@db:5432/${POSTGRES_DB:-openwm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WMS_API_URL: ${WMS_API_URL:-http://localhost:8000}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-480}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app

  web:
    build:
      context: ./frontend
    container_name: openwm-web
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: openwm-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@openwm.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      - db
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data:
